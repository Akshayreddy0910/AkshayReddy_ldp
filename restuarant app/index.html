<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Billing System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tables-section">
            <h2>Tables</h2>
            <input type="text" id="tableSearch" placeholder="Search Table">
            <div id="tablesContainer"></div>
        </div>

        <div class="menu-section">
            <h2>Menu</h2>
            <input type="text" id="menuSearch" placeholder="Search Menu by name">
            <div id="menuContainer"></div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <h2 id="modalTitle"></h2>
            <table>
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody id="orderBody"></tbody>
            </table>
            <h3 id="grandTotal"></h3>
            <button id="generateBill">Close Session (Generate Bill)</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="dom.js"></script>
    <script src="table.js"></script>
    <script src="rendertable.js"></script>
    <script src="rendermenu.js"></script>
    <script src="modal.js"></script>
    <script src="ordermodal.js"></script>
    <script src="billing.js"></script>
    <script src="searchmain.js"></script>
</body>
</html>
