<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debouncing & Throttling</title>
</head>
<body>
<h2>Search</h2>
<input
    type="text"
    id="search"
    placeholder="Search here..."
    onkeyup="debounceSearch()"
>
<p id="result"></p>
<script src="script.js"></script>
</body>
</html>
